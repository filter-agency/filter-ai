name: Plugin deploy
on:
  workflow_dispatch:
    inputs:
      version:
        description: '1.x.x or v1.x.x version to deploy'
        required: true
jobs:
  asset_deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Validate public 1.x deploy
      id: release
      env:
        RELEASE_VERSION: ${{ github.event.inputs.version }}
      run: |
        case "$RELEASE_VERSION" in
          v1.*)
            echo "ref=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "version=${RELEASE_VERSION#v}" >> "$GITHUB_OUTPUT"
            ;;
          1.*)
            echo "ref=v$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            echo "version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
            ;;
          *)
            echo "::error::This public workflow only deploys Filter AI 1.x releases. Use filter-agency/filter-ai-pro for 2.x."
            exit 1
            ;;
        esac
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.release.outputs.ref }}
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring,xml,zip
    - name: Mark repository safe for git
      run: |
        git config --global --add safe.directory /app || true
        git config --global --add safe.directory "${{ github.workspace }}" || true
    - name: Install Composer dependencies
      run: composer install --no-interaction --prefer-dist --no-progress
    - name: WordPress.org plugin deploy
      uses: 10up/action-wordpress-plugin-deploy@stable
      env:
        SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
        SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
        VERSION: ${{ steps.release.outputs.version }}
